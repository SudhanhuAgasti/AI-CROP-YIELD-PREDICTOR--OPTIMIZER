<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif;}
    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a46c9, #78e807);
    }
    .container {
      width: 380px; padding: 2rem; border-radius: 20px;
      background: rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      backdrop-filter: blur(12px); color: #fff; overflow: hidden;
    }
    h2 {text-align: center; margin-bottom: 1.5rem;}
    .form {display: none; flex-direction: column; gap: 1rem;}
    .form.active {display: flex;}
    .form input {
      padding: 0.9rem 1rem; border: none; border-radius: 10px;
      outline: none; background: rgba(255,255,255,0.2); color: #fff;
      font-size: 1rem; transition: 0.3s;
    }
    .form input::placeholder {color: rgba(255,255,255,0.7);}
    .form input:focus {background: rgba(0,0,0,0.3);}
    .btn {
      padding: 0.9rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #00ff99, #00ccff);
      color: #fff; font-size: 1.05rem; font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
    .btn:hover {background: linear-gradient(135deg, #00ccff, #00ff99); transform: scale(1.05);}
    .toggle {text-align: center; margin-top: 1rem; font-size: 0.9rem;}
    .toggle a {color: #00ffcc; cursor: pointer; font-weight: bold; text-decoration: none;}
    .toggle a:hover {text-decoration: underline;}
  </style>
</head>
<body>

  <div class="container">
    <!-- Login Form -->
    <form class="form active" id="loginForm">
      <h2><b>🍃 LOG IN 🍃</b></h2>
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
      <div class="toggle">
        Don’t have an account? <a onclick="showRegister()">Register</a>
      </div>
    </form>

    <!-- Register Form -->
    <form class="form" id="registerForm">
      <h2>Register</h2>
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <input type="password" id="regConfirm" placeholder="Confirm Password" required>
      <button type="submit" class="btn">Register</button>
      <div class="toggle">
        Already have an account? <a onclick="showLogin()">Login</a>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    function showRegister() {
      loginForm.classList.remove("active");
      registerForm.classList.add("active");
    }

    function showLogin() {
      registerForm.classList.remove("active");
      loginForm.classList.add("active");
    }

    // Register logic
    registerForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const pass = document.getElementById("regPassword").value;
      const confirm = document.getElementById("regConfirm").value;

      if (pass !== confirm) {
        alert("Passwords do not match ❌");
        return;
      }

      // Save user data in localStorage
      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPass", pass);

      alert("Registration Successful 🎉. Please Login!");
      showLogin();
    });

    // Login logic
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;

      const storedEmail = localStorage.getItem("userEmail");
      const storedPass = localStorage.getItem("userPass");

      if (email === storedEmail && pass === storedPass) {
        alert("Login Successful 🎉");
      } else {
        alert("Invalid Email or Password ❌");
      }
    });
  </script>

</body>
</html>
